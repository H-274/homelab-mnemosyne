version: "3.3"

x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/glance.svg
  urls:
    - https://github.com/glanceapp/glance

services:
  glance:
    container_name: glance
    hostname: glance.internal
    image: glanceapp/glance
    restart: unless-stopped
    environment:
      - JELLYFIN_API_KEY
    volumes:
      - /volumes/dashboard/glance/config:/app/config
      - /volumes/dashboard/glance/assets:/app/assets
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - exposed-internal
      - exposed-external
    labels:
      # traefik
      traefik.enable: true
      traefik.docker.network: exposed-internal
      traefik.http.routers.glance.rule: Host(`glance.jsmarier.dev`)
      traefik.http.routers.glance.entrypoints: websecure
      traefik.http.routers.glance.tls: true
      traefik.http.routers.glance.tls.certresolver: cloudflare
      traefik.http.services.glance.loadbalancer.server.port: 8080

      # arcane
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/glance.svg

      # glance
      glance.category: other
      glance.name: Glance
      glance.icon: di:glance
      glance.url: https://glance.jsmarier.dev/
      glance.description: Pretty dashboard

networks:
  exposed-internal:
    external: true
  exposed-external:
    external: true
