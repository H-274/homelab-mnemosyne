services:
  sonarr:
    image: ghcr.io/hotio/sonarr
    cap_add:
      - NET_ADMIN
    volumes:
      - /arr-stack/config/sonarr:/config
      - /arr-stack/data:/data
    networks:
      - exposed-internal
    environment:
      - VPN_ENABLED=true
      - VPN_CONF=wg0
      - VPN_PROVIDER=pia
      - VPN_LAN_NETWORK=192.168.1.0/24
      - VPN_LAN_LEAK_ENABLED=false
      # - VPN_EXPOSE_PORTS_ON_LAN
      - VPN_AUTO_PORT_FORWARD=true
      # - VPN_PORT_REDIRECTS
      - VPN_HEALTHCHECK_ENABLED=false
      - VPN_NAMESERVERS
      # - VPN_INTERFACE_PREFIXES
      - VPN_PIA_USER
      - VPN_PIA_PASS
      # - VPN_PIA_PREFERRED_REGION
      # - VPN_PIA_DIP_TOKEN
      - VPN_PIA_PORT_FORWARD_PERSIST=false
      - PRIVOXY_ENABLED=true
      - UNBOUND_ENABLED=false
      # - UNBOUND_NAMESERVERS
      # --- Basic --- #
      - PUID=111
      - PGID=321
      - UMASK=002
      - TZ=Etc/UTC
      - WEBUI_PORTS=8989/tcp
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - traefik.http.routers.sonarr.rule=Host(`sonarr.mnemosyne.lan`)
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
      - traefik.http.routers.sonarr.entrypoints=web

  radarr:
    image: ghcr.io/hotio/radarr
    cap_add:
      - NET_ADMIN
    volumes:
      - /arr-stack/config/radarr:/config
      - /arr-stack/data:/data
    networks:
      - exposed-internal
    environment:
      - VPN_ENABLED=true
      - VPN_CONF=wg0
      - VPN_PROVIDER=pia
      - VPN_LAN_NETWORK=192.168.1.0/24
      - VPN_LAN_LEAK_ENABLED=false
      # - VPN_EXPOSE_PORTS_ON_LAN
      - VPN_AUTO_PORT_FORWARD=true
      # - VPN_PORT_REDIRECTS
      - VPN_HEALTHCHECK_ENABLED=false
      - VPN_NAMESERVERS
      # - VPN_INTERFACE_PREFIXES
      - VPN_PIA_USER
      - VPN_PIA_PASS
      # - VPN_PIA_PREFERRED_REGION
      # - VPN_PIA_DIP_TOKEN
      - VPN_PIA_PORT_FORWARD_PERSIST=false
      - PRIVOXY_ENABLED=true
      - UNBOUND_ENABLED=false
      # - UNBOUND_NAMESERVERS
      # --- Basic --- #
      - PUID=111
      - PGID=321
      - UMASK=002
      - TZ=Etc/UTC
      - WEBUI_PORTS=7878/tcp
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - traefik.http.routers.radarr.rule=Host(`radarr.mnemosyne.lan`)
      - traefik.http.services.radarr.loadbalancer.server.port=7878
