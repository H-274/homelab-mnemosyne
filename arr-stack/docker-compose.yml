    volumes:
      - /arr-stack/config/jellyfin:/config
      - /arr-stack/data/media:/data/media
    networks:
      - exposed-internal
      - exposed-external
    environment:
      - PUID=444
      - PGID=321
      - UMASK=002
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - traefik.http.routers.sabnzbd.rule=Host(`jellyfin.jsmarier.com`)
      - traefik.http.services.sabnzbd.loadbalancer.server.port=8096
      - traefik.http.routers.sabnzbd.entrypoints=web

networks:
  exposed-internal:
    external: true
  exposed-external:
    external: true
