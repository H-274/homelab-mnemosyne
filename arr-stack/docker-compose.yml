version: "3.3"

x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/servarr.svg
  urls:
    - https://wiki.servarr.com/

services:
  sonarr-en:
    container_name: sonarr-en
    image: ghcr.io/hotio/sonarr
    hostname: sonarr-en.internal
    cap_add:
      - NET_ADMIN
    volumes:
      - /arr-stack/config/sonarr/en:/config
      - /arr-stack/data:/data
    networks:
      - exposed-internal
    environment:
      - VPN_ENABLED=true
      - VPN_CONF=wg0
      - VPN_PROVIDER=pia
      - VPN_LAN_NETWORK=192.168.1.0/24
      - VPN_LAN_LEAK_ENABLED=false
      # - VPN_EXPOSE_PORTS_ON_LAN
      - VPN_AUTO_PORT_FORWARD=true
      # - VPN_PORT_REDIRECTS
      - VPN_HEALTHCHECK_ENABLED=false
      - VPN_NAMESERVERS
      # - VPN_INTERFACE_PREFIXES
      - VPN_PIA_USER
      - VPN_PIA_PASS
      # - VPN_PIA_PREFERRED_REGION
      # - VPN_PIA_DIP_TOKEN
      - VPN_PIA_PORT_FORWARD_PERSIST=false
      - PRIVOXY_ENABLED=true
      - UNBOUND_ENABLED=false
      # - UNBOUND_NAMESERVERS
      # --- Basic --- #
      - PUID=111
      - PGID=321
      - UMASK=002
      - TZ=Etc/UTC
      - WEBUI_PORTS=8989/tcp
    restart: unless-stopped
    labels:
      # traefik
      traefik.enable: true
      traefik.http.routers.sonarr-en.rule: Host(`sonarr.mnemosyne.lan`) && PathPrefix(`/en`)
      traefik.http.services.sonarr-en.loadbalancer.server.port: 8989
      traefik.http.routers.sonarr-en.entrypoints: web
      traefik.http.routers.sonarr-en.tls: true

      # fallback traefik
      #traefik.http.routers.sonarr.rule: Host(`sonarr.mnemosyne.lan`) && PathPrefix(`/`)
      #traefik.http.routers.sonarr.middlewares: default-locale
      #traefik.http.routers.sonarr.priority: 1
      #traefik.http.routers.sonarr.entrypoints: web
      #traefik.http.routers.sonarr.tls: true
      #traefik.http.routers.services: sonarr-en

      # arcane
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/sonarr.svg

      # glance
      glance.id: sonarr
      glance.category: media
      glance.name: Sonarr EN
      glance.icon: di:sonarr
      glance.url: https://sonarr.mnemosyne.lan:81/en
      glance.description: English show acquisition

