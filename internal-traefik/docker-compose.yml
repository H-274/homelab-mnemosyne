version: "3.3"

x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/traefik.svg
  urls:
    - https://doc.traefik.io/traefik/https://doc.traefik.io/traefik/

services:
  traefik:
    container_name: traefik
    hostname: traefik.internal
    image: traefik:v3.7
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - CF_DNS_API_TOKEN
    command:
      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"

      # Attach the static configuration file
      #- "--configFile=/proxy/traefik/config.yaml"

      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=exposed-internal"

      # API & Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Observability
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
      - "--entryPoints.metrics.address=:8082"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addRoutersLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--log.level=DEBUG"

    # Traefik Dynamic configuration via Docker labels
    labels:
      # Enable self‑routing
      traefik.enable: true

      # Dashboard router
      traefik.http.routers.dashboard.rule: Host(`dashboard.mnemosyne.lan`)
      traefik.http.routers.dashboard.entrypoints: websecure
      traefik.http.routers.dashboard.service: api@internal
      traefik.http.routers.dashboard.tls: true

      # global middleware
      traefik.http.middlewares.default-locale.addprefix.prefix: "/en"

      # Basic‑auth middleware
      # - "traefik.http.middlewares.dashboard-auth.basicauth.users=<PASTE_HASH_HERE>"
      # - "traefik.http.routers.dashboard.middlewares=dashboard-auth@docker"

      # glance
      glance.category: other
      glance.name: Traefik
      glance.icon: di:traefik
      glance.url: https://dashboard.mnemosyne.lan:81
      glance.description: Local Reverse Proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /volumes/proxy:/proxy
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - exposed-internal

networks:
  exposed-internal:
    name: exposed-internal
    external: true
